<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="fresvora page3.css">
    <title>Fresvora</title>
</head>
<body>
    <section class="page3">
        <form action="/create account" method="post" class="margin">
        <div class="pa">
                <p class="get">GET STARTED</p>
                 <h1 class="create">Create account</h1>
                 <p class="fres">Fresh food is one sign-up away</p>
        </div>
        <div class="for">
            <div class="first">
                <label class="fnn"><span class="rst">FIRST NAME</span> <br>
                    <input class="idong" type="text" id="idongesit" placeholder="Idongesit" required autocomplete="first">
                </label>
                <label class="fnnn"><span class="rstt">LAST NAME</span> <br>
                    <input class="idonge" type="text" placeholder="Ikpe" required autocomplete="last name">
                </label>
            </div>
            <label class="fnd"><span class="em">EMAIL</span> <br>
                <input type="email" class="you" placeholder="you@example.com" required autocomplete="email">
            </label>
        
            <label class="fnd"><span class="em">PHONE</span><br>
            <input class="you" type="phone number" placeholder="+234 800 000 0000" required autocomplete="phone number" minlength="11" maxlength="11">
             </label>
        
        
            <label class="fnd"><span class="emd">DELIVERY ADDRESS</span> <br>
                <input class="you" type="address" placeholder="Street, City" required autocomplete="address">
            </label>
        
        
            <label for="PASSWORD" class="fnd"><span class="emp">PASSWORD</span> <br>
                <input class="you" type="password" placeholder="Min. 8 characters" required autocomplete="current-password" minlength="8">
            </label>
    
            <lable class="fnd"><span class="ema">ACCOUNT TYPE</span> <br>
                <select class="individual">
                    <option value="1">Individual / Home</option>
                    <option value="2">Individual</option>
                    <option value="3">Home</option>
                </select>
            </lable>
             <div class="term">
            <p class="agree"><input class="che" type="checkbox"> I agree to Fresvora's Terms of Service and Privacy Policy</p>
            <input  class="ac" type="submit" placeholder="Create Account" value="Create Account">
             </div>
            <div class="hav">
           <p class="havp">Have an account? <a href="sign up.html" class="sn">Sign-in</a></p>    
            </div>
           </div>
        </form>
    </section>
</body>
</html>
